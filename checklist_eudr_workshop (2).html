<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnóstico EUDR — GT Cadeias</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1B5E20; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1.5rem; }

  .top { text-align: center; margin-bottom: 2rem; }
  .top .label { font-size: 12px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #81C784; margin-bottom: 6px; }
  .top .title { font-size: 22px; font-weight: 700; color: #fff; line-height: 1.3; max-width: 560px; }
  .counter { font-size: 13px; color: #A5D6A7; margin-top: 8px; }

  .section-pill { display: inline-block; font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 4px 12px; border-radius: 99px; background: rgba(255,255,255,0.15); color: #E8F5E9; margin-bottom: 1.25rem; }

  .dots { display: flex; gap: 5px; justify-content: center; margin-bottom: 2rem; flex-wrap: wrap; max-width: 300px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.25); transition: background 0.3s; }
  .dot.active { background: #fff; }
  .dot.done { background: #81C784; }

  .question-text { font-size: 19px; font-weight: 600; color: #fff; text-align: center; max-width: 560px; line-height: 1.45; margin-bottom: 2rem; }

  .options { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 560px; }

  .opt {
    padding: 14px 18px; border-radius: 12px;
    background: rgba(255,255,255,0.12); border: 2px solid rgba(255,255,255,0.2);
    color: #fff; font-size: 14px; font-weight: 500; text-align: left;
    cursor: pointer; transition: all 0.15s; font-family: inherit;
    display: flex; align-items: center; gap: 12px;
  }
  .opt:hover { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.5); }
  .opt.selected { background: #fff; border-color: #fff; color: #1B5E20; }

  .opt-letter {
    flex-shrink: 0; width: 26px; height: 26px; border-radius: 50%;
    background: rgba(255,255,255,0.2); color: #fff;
    font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .opt.selected .opt-letter { background: #2D7A3A; color: #fff; }

  .next-btn {
    margin-top: 2rem; padding: 14px 40px; border-radius: 99px;
    background: #fff; color: #1B5E20; font-size: 16px; font-weight: 700;
    border: none; cursor: pointer; transition: opacity 0.15s; font-family: inherit;
    opacity: 0.4; pointer-events: none;
  }
  .next-btn.ready { opacity: 1; pointer-events: all; }
  .next-btn.ready:hover { background: #E8F5E9; }

  .thankyou { text-align: center; }
  .thankyou .big { font-size: 64px; margin-bottom: 1rem; }
  .thankyou h2 { font-size: 26px; font-weight: 700; color: #fff; margin-bottom: 8px; }
  .thankyou p { font-size: 15px; color: #A5D6A7; line-height: 1.6; max-width: 400px; }
</style>
</head>
<body>

<div class="top">
  <div class="label">GT Cadeias de Valor Livres de Desmatamento</div>
  <div class="title">Diagnóstico EUDR</div>
  <div class="counter" id="counter">Pergunta 1 de 12</div>
</div>

<div class="dots" id="dots"></div>

<div id="quiz" style="display:flex;flex-direction:column;align-items:center">
  <div class="section-pill" id="section-pill"></div>
  <div class="question-text" id="qtext"></div>
  <div class="options" id="opts"></div>
  <button class="next-btn" id="next-btn" onclick="next()">Próxima →</button>
</div>

<div id="thankyou" style="display:none" class="thankyou">
  <div class="big">🌿</div>
  <h2>Obrigada!</h2>
  <p>Suas respostas foram registradas e vão ajudar o GT a mapear os gargalos na adequação à EUDR.</p>
</div>

<script>
const SHEET_URL = "https://script.google.com/macros/s/AKfycbzZ2zdWBRk1KKbeHSpZTYfPKkKogoS77uoNgr6uQUfO4RZufuDQ-gekNwS1Yc9KjGYTzA/exec";

const questions = [
  { section: "Conhecimento regulatório", q: "Como você avalia o conhecimento da sua equipe sobre os requisitos da EUDR?", opts: ["Conhecemos bem e já mapeamos os requisitos aplicáveis","Conhecimento parcial, há lacunas nos detalhes","Conhecemos superficialmente, precisamos aprofundar","Ainda não estudamos a regulamentação"] },
  { section: "Conhecimento regulatório", q: "Sua empresa já identificou quais produtos estão sujeitos à EUDR?", opts: ["Sim, mapeamos todos os produtos e fluxos relevantes","Parcialmente — cobrimos os principais, mas há gaps","Ainda estamos nesse processo de identificação","Ainda não iniciamos esse mapeamento"] },
  { section: "Conhecimento regulatório", q: "Como acompanham as atualizações e prazos regulatórios da EUDR?", opts: ["Temos processo formal de monitoramento regulatório","Acompanhamos de forma ad hoc, sem processo estruturado","Dependemos de informações de parceiros externos","Não temos acompanhamento sistemático"] },
  { section: "Rastreabilidade e cadeia", q: "Até que nível da cadeia você consegue rastrear a origem dos produtos?", opts: ["Fornecedores diretos e indiretos (1º e 2º nível ou mais)","Apenas fornecedores diretos (1º nível)","Rastreamento parcial, com gaps significativos","Não temos rastreabilidade estruturada"] },
  { section: "Rastreabilidade e cadeia", q: "Sua empresa coleta geolocalização das áreas de produção dos fornecedores?", opts: ["Sim, de forma sistematizada para a maioria","Sim, mas apenas para fornecedores prioritários","Estamos em processo de coleta","Ainda não coletamos essa informação"] },
  { section: "Rastreabilidade e cadeia", q: "Qual o principal gargalo na rastreabilidade da sua cadeia?", opts: ["Resistência ou incapacidade dos fornecedores","Falta de sistema ou plataforma tecnológica","Complexidade e volume da cadeia","Ausência de processo ou política interna"] },
  { section: "Monitoramento e ferramentas", q: "Quais ferramentas de monitoramento de desmatamento sua empresa usa?", opts: ["Múltiplas plataformas (GFW, Trase, Agrobrasil...)","Uma plataforma de forma regular","Esporadicamente, sem processo definido","Ainda não usamos ferramentas"] },
  { section: "Monitoramento e ferramentas", q: "Sua empresa faz avaliações periódicas de risco de desmatamento nos fornecedores?", opts: ["Sim, com metodologia estruturada e periodicidade definida","Sim, mas de forma pontual e sem padronização","Estamos desenvolvendo essa capacidade","Ainda não realizamos esse tipo de avaliação"] },
  { section: "Due diligence e operação", q: "Sua empresa tem processo formal de due diligence socioambiental para fornecedores?", opts: ["Sim, aplicado a todos os fornecedores relevantes","Sim, apenas para fornecedores de alto risco","Em desenvolvimento, ainda não operacional","Não temos processo formal"] },
  { section: "Due diligence e operação", q: "Como avalia a capacidade dos fornecedores de atender às exigências da EUDR?", opts: ["A maioria tem capacidade e já está se adequando","Parte tem capacidade, mas há fornecedores vulneráveis","Poucos têm capacidade — risco de perda de fornecedores","Não temos informação suficiente para avaliar"] },
  { section: "Governança interna", q: "Há um responsável definido internamente para coordenar a adequação à EUDR?", opts: ["Sim, equipe ou responsável dedicado com mandato claro","Há responsável, mas sem dedicação exclusiva","Está sendo definido, ainda não formalizado","Ainda não há responsável definido"] },
  { section: "Governança interna", q: "O tema EUDR está incorporado à estratégia e ao planejamento da empresa?", opts: ["Sim, integrado ao planejamento com recursos alocados","Está no radar, mas sem recursos formalmente alocados","Em discussão, ainda fora do planejamento formal","Ainda não é uma prioridade interna"] },
];

const answers = new Array(questions.length).fill(null);
let current = 0;

function buildDots() {
  const d = document.getElementById('dots');
  questions.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i===0?' active':'');
    dot.id = 'dot-'+i;
    d.appendChild(dot);
  });
}

function render() {
  const q = questions[current];
  document.getElementById('counter').textContent = `Pergunta ${current+1} de ${questions.length}`;
  document.getElementById('section-pill').textContent = q.section;
  document.getElementById('qtext').textContent = q.q;
  const opts = document.getElementById('opts');
  opts.innerHTML = q.opts.map((o,i) => `
    <button class="opt${answers[current]===i?' selected':''}" onclick="select(${i})">
      <span class="opt-letter">${String.fromCharCode(65+i)}</span>
      ${o}
    </button>`).join('');
  const btn = document.getElementById('next-btn');
  btn.textContent = current === questions.length-1 ? 'Enviar ✓' : 'Próxima →';
  btn.classList.toggle('ready', answers[current] !== null);
  questions.forEach((_,i) => {
    const dot = document.getElementById('dot-'+i);
    dot.className = 'dot' + (i===current?' active': i<current?' done':'');
  });
}

function select(i) {
  answers[current] = i;
  render();
}

function next() {
  if (answers[current] === null) return;
  if (current === questions.length-1) { submit(); return; }
  current++;
  render();
}

function submit() {
  const headers = ["Timestamp","Formulário","Conhecimento 1","Conhecimento 2","Conhecimento 3","Rastreabilidade 1","Rastreabilidade 2","Rastreabilidade 3","Monitoramento 1","Monitoramento 2","Due Diligence 1","Due Diligence 2","Governança 1","Governança 2"];
  const values = [new Date().toLocaleString('pt-BR'), "EUDR", ...answers.map((a,i)=>a!==null?questions[i].opts[a]:"")];
  fetch(SHEET_URL, {
    method:"POST", mode:"no-cors",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ headers, values })
  }).catch(()=>{});
  document.getElementById('quiz').style.display='none';
  document.getElementById('counter').style.display='none';
  document.getElementById('dots').style.display='none';
  document.getElementById('thankyou').style.display='block';
  document.querySelector('.title').textContent='Segundo Encontro GT Cadeias';
}

buildDots(); render();
</script>
</body>
</html>
