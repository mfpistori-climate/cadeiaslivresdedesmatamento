<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Master Class GT Cadeias</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1B5E20; min-height: 100vh; padding: 2rem 1.5rem; }
  .header { text-align: center; margin-bottom: 2rem; }
  .header .label { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #81C784; margin-bottom: 6px; }
  .header h1 { font-size: 24px; font-weight: 700; color: #fff; }
  .header .meta { font-size: 13px; color: #A5D6A7; margin-top: 6px; }
  .stat-bar { display: flex; justify-content: center; gap: 16px; margin-bottom: 2.5rem; flex-wrap: wrap; }
  .stat { background: rgba(255,255,255,0.12); border-radius: 12px; padding: 14px 28px; text-align: center; }
  .stat .num { font-size: 32px; font-weight: 700; color: #fff; }
  .stat .lbl { font-size: 12px; color: #A5D6A7; margin-top: 2px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; max-width: 1100px; margin: 0 auto; }
  .card { background: rgba(255,255,255,0.1); border-radius: 14px; padding: 1.25rem; }
  .card-title { font-size: 13px; font-weight: 600; color: #81C784; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
  .card-q { font-size: 15px; font-weight: 600; color: #fff; line-height: 1.4; margin-bottom: 1.25rem; }
  .bar-row { margin-bottom: 10px; }
  .bar-label { font-size: 13px; color: #E8F5E9; margin-bottom: 4px; display: flex; justify-content: space-between; gap: 8px; }
  .bar-label span:first-child { flex: 1; }
  .bar-label .pct { color: #81C784; font-weight: 700; flex-shrink: 0; }
  .bar-bg { background: rgba(255,255,255,0.15); border-radius: 99px; height: 10px; }
  .bar-fill { height: 10px; border-radius: 99px; background: #4CAF50; transition: width 0.6s ease; }
  .refresh-btn { display: block; margin: 2rem auto 0; padding: 10px 28px; border-radius: 99px; background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.3); color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; transition: background 0.15s; }
  .refresh-btn:hover { background: rgba(255,255,255,0.25); }
  .auto-tag { font-size: 11px; color: #81C784; text-align: center; margin-top: 8px; }
  .msg { text-align: center; color: #A5D6A7; font-size: 15px; margin-top: 2rem; }
</style>
</head>
<body>

<div class="header">
  <div class="label">GT Cadeias de Valor Livres de Desmatamento</div>
  <h1>Diagnóstico Rápido — Master Class</h1>
  <div class="meta" id="meta">Carregando respostas...</div>
</div>

<div class="stat-bar">
  <div class="stat"><div class="num" id="total">—</div><div class="lbl">respostas</div></div>
  <div class="stat"><div class="num" id="last-time">—</div><div class="lbl">última resposta</div></div>
</div>

<div id="content" class="msg">Buscando dados...</div>

<button class="refresh-btn" onclick="load()">↻ Atualizar</button>
<div class="auto-tag">Atualização automática a cada 30 segundos</div>

<script>
const SHEET_URL = "https://script.google.com/macros/s/AKfycbzZ2zdWBRk1KKbeHSpZTYfPKkKogoS77uoNgr6uQUfO4RZufuDQ-gekNwS1Yc9KjGYTzA/exec";

const questions = [
  { section: "Engajamento", q: "Como está o engajamento da sua organização com o tema de desmatamento?", opts: ["Temos políticas e processos ativos de antidesmatamento","O tema está na agenda, em fase de planejamento","Reconhecemos a relevância, mas ainda sem ações concretas","Ainda não é uma prioridade"] },
  { section: "Rastreabilidade", q: "Qual o nível de rastreabilidade da origem dos seus produtos ou insumos?", opts: ["Rastreamos até o produtor/propriedade de origem","Rastreamos até o fornecedor direto (1º nível)","Rastreabilidade parcial, com gaps relevantes","Não temos rastreabilidade estruturada"] },
  { section: "Ferramentas", q: "Sua organização usa alguma ferramenta para monitorar riscos de desmatamento?", opts: ["Sim, plataformas específicas (GFW, Trase, Agrobrasil...)","Usamos certificações como proxy de risco","Informações pontuais de fornecedores, sem plataforma","Ainda não usamos ferramentas de monitoramento"] },
  { section: "Desafios", q: "Qual é o maior desafio para avançar em cadeias livres de desmatamento?", opts: ["Obter dados confiáveis dos fornecedores","Custo e complexidade de implementação","Engajamento e capacidade técnica dos fornecedores","Falta de clareza sobre os requisitos regulatórios"] },
  { section: "Expectativas", q: "O que você espera levar desta master class?", opts: ["Ferramentas concretas para começar a usar","Entender melhor os requisitos da EUDR","Trocar experiências com pares","Panorama geral para apresentar internamente"] }
];

function load() {
  const cb = "cb_" + Date.now();
  window[cb] = function(rows) {
    try {
      const data = rows.filter(r => r[1] === "Masterclass");
      const total = data.length;
      document.getElementById('total').textContent = total;

      if (total === 0) {
        document.getElementById('content').className = 'msg';
        document.getElementById('content').textContent = 'Aguardando respostas...';
        document.getElementById('meta').textContent = 'Nenhuma resposta ainda';
        document.getElementById('last-time').textContent = '—';
        return;
      }

      const last = data[data.length-1][0];
      document.getElementById('last-time').textContent = last.toString().split(' ')[1] || last;
      document.getElementById('meta').textContent = '24 de julho de 2026 · atualizado agora';

      const cards = questions.map((q, qi) => {
        const counts = q.opts.map(() => 0);
        data.forEach(row => {
          const val = row[qi + 2];
          const idx = q.opts.indexOf(val);
          if (idx >= 0) counts[idx]++;
        });
        const max = Math.max(...counts, 1);
        const bars = q.opts.map((opt, i) => {
          const pct = Math.round(counts[i] / total * 100);
          const w = Math.round(counts[i] / max * 100);
          return `<div class="bar-row">
            <div class="bar-label"><span>${opt}</span><span class="pct">${pct}%</span></div>
            <div class="bar-bg"><div class="bar-fill" style="width:${w}%"></div></div>
          </div>`;
        }).join('');
        return `<div class="card">
          <div class="card-title">${q.section}</div>
          <div class="card-q">${q.q}</div>
          ${bars}
        </div>`;
      }).join('');

      document.getElementById('content').className = 'grid';
      document.getElementById('content').innerHTML = cards;
    } catch(e) {
      document.getElementById('content').className = 'msg';
      document.getElementById('content').innerHTML = '<span style="color:#ef9a9a">Erro ao processar dados.</span>';
    }
    delete window[cb];
  };

  const script = document.createElement('script');
  script.src = SHEET_URL + "?callback=" + cb + "&t=" + Date.now();
  script.onerror = function() {
    document.getElementById('content').className = 'msg';
    document.getElementById('content').innerHTML = '<span style="color:#ef9a9a">Erro ao conectar. Verifique a implantação do Apps Script.</span>';
    delete window[cb];
  };
  document.head.appendChild(script);
  setTimeout(() => { if (window[cb]) { script.onerror(); } }, 8000);
}

load();
setInterval(load, 30000);
</script>
</body>
</html>
