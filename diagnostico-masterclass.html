<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnóstico — Master Class GT Cadeias</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1B5E20; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1.5rem; }

  .top { text-align: center; margin-bottom: 2rem; }
  .top .label { font-size: 12px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #81C784; margin-bottom: 6px; }
  .top .title { font-size: 22px; font-weight: 700; color: #fff; line-height: 1.3; max-width: 560px; }

  .counter { font-size: 13px; color: #A5D6A7; margin-top: 8px; }

  .dots { display: flex; gap: 6px; justify-content: center; margin-bottom: 2rem; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.25); transition: background 0.3s; }
  .dot.active { background: #fff; }
  .dot.done { background: #81C784; }

  .question-text { font-size: 20px; font-weight: 600; color: #fff; text-align: center; max-width: 560px; line-height: 1.45; margin-bottom: 2rem; }

  .options { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 560px; }

  .opt {
    padding: 16px 20px; border-radius: 12px;
    background: rgba(255,255,255,0.12); border: 2px solid rgba(255,255,255,0.2);
    color: #fff; font-size: 15px; font-weight: 500; text-align: left;
    cursor: pointer; transition: all 0.15s; font-family: inherit;
    display: flex; align-items: center; gap: 14px;
  }
  .opt:hover { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.5); }
  .opt.selected { background: #fff; border-color: #fff; color: #1B5E20; }

  .opt-letter {
    flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%;
    background: rgba(255,255,255,0.2); color: #fff;
    font-size: 13px; font-weight: 700; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .opt.selected .opt-letter { background: #2D7A3A; color: #fff; }

  .next-btn {
    margin-top: 2rem; padding: 14px 40px; border-radius: 99px;
    background: #fff; color: #1B5E20; font-size: 16px; font-weight: 700;
    border: none; cursor: pointer; transition: opacity 0.15s; font-family: inherit;
    opacity: 0.4; pointer-events: none;
  }
  .next-btn.ready { opacity: 1; pointer-events: all; }
  .next-btn.ready:hover { background: #E8F5E9; }

  .thankyou { text-align: center; }
  .thankyou .big { font-size: 64px; margin-bottom: 1rem; }
  .thankyou h2 { font-size: 26px; font-weight: 700; color: #fff; margin-bottom: 8px; }
  .thankyou p { font-size: 15px; color: #A5D6A7; line-height: 1.6; max-width: 400px; }
</style>
</head>
<body>

<div class="top">
  <div class="label">GT Cadeias de Valor Livres de Desmatamento</div>
  <div class="title">Diagnóstico rápido — Master Class</div>
  <div class="counter" id="counter">Pergunta 1 de 5</div>
</div>

<div class="dots" id="dots"></div>

<div id="quiz">
  <div class="question-text" id="qtext"></div>
  <div class="options" id="opts"></div>
  <button class="next-btn" id="next-btn" onclick="next()">Próxima →</button>
</div>

<div id="thankyou" style="display:none" class="thankyou">
  <div class="big">🌿</div>
  <h2>Obrigada!</h2>
  <p>Suas respostas foram registradas e vão ajudar o GT a entender melhor o perfil do grupo.</p>
</div>

<script>
const SHEET_URL = "https://script.google.com/macros/s/AKfycbzZ2zdWBRk1KKbeHSpZTYfPKkKogoS77uoNgr6uQUfO4RZufuDQ-gekNwS1Yc9KjGYTzA/exec";

const questions = [
  { q: "Como está o engajamento da sua organização com o tema de desmatamento nas cadeias de valor?", opts: ["Temos políticas e processos ativos de antidesmatamento", "O tema está na agenda, em fase de planejamento", "Reconhecemos a relevância, mas ainda sem ações concretas", "Ainda não é uma prioridade"] },
  { q: "Qual o nível de rastreabilidade da origem dos seus produtos ou insumos?", opts: ["Rastreamos até o produtor/propriedade de origem", "Rastreamos até o fornecedor direto (1º nível)", "Rastreabilidade parcial, com gaps relevantes", "Não temos rastreabilidade estruturada"] },
  { q: "Sua organização usa alguma ferramenta para monitorar riscos de desmatamento?", opts: ["Sim, plataformas específicas (GFW, Trase, Agrobrasil...)", "Usamos certificações como proxy de risco", "Informações pontuais de fornecedores, sem plataforma", "Ainda não usamos ferramentas de monitoramento"] },
  { q: "Qual é o maior desafio para avançar em cadeias livres de desmatamento?", opts: ["Obter dados confiáveis dos fornecedores", "Custo e complexidade de implementação", "Engajamento e capacidade técnica dos fornecedores", "Falta de clareza sobre os requisitos regulatórios"] },
  { q: "O que você espera levar desta master class?", opts: ["Ferramentas concretas para começar a usar", "Entender melhor os requisitos da EUDR", "Trocar experiências com pares", "Panorama geral para apresentar internamente"] }
];

const labels = ["Engajamento","Rastreabilidade","Ferramentas","Gargalo","Expectativa"];
const answers = new Array(questions.length).fill(null);
let current = 0;

function buildDots() {
  const d = document.getElementById('dots');
  questions.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i===0?' active':'');
    dot.id = 'dot-'+i;
    d.appendChild(dot);
  });
}

function render() {
  const q = questions[current];
  document.getElementById('counter').textContent = `Pergunta ${current+1} de ${questions.length}`;
  document.getElementById('qtext').textContent = q.q;
  const opts = document.getElementById('opts');
  opts.innerHTML = q.opts.map((o,i) => `
    <button class="opt${answers[current]===i?' selected':''}" onclick="select(${i})">
      <span class="opt-letter">${String.fromCharCode(65+i)}</span>
      ${o}
    </button>`).join('');
  const btn = document.getElementById('next-btn');
  btn.textContent = current === questions.length-1 ? 'Enviar ✓' : 'Próxima →';
  btn.classList.toggle('ready', answers[current] !== null);
  questions.forEach((_,i) => {
    const dot = document.getElementById('dot-'+i);
    dot.className = 'dot' + (i===current?' active': i<current?' done':'');
  });
}

function select(i) {
  answers[current] = i;
  render();
}

function next() {
  if (answers[current] === null) return;
  if (current === questions.length-1) { submit(); return; }
  current++;
  render();
}

function submit() {
  const headers = ["Timestamp", "Formulário", ...labels];
  const values = [
    new Date().toLocaleString('pt-BR'),
    "Masterclass",
    ...answers.map((a,i) => a!==null ? questions[i].opts[a] : "")
  ];
  fetch(SHEET_URL, {
    method: "POST", mode: "no-cors",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ headers, values })
  }).catch(()=>{});
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('counter').style.display = 'none';
  document.getElementById('dots').style.display = 'none';
  document.getElementById('thankyou').style.display = 'block';
  document.querySelector('.title').textContent = 'Master Class · 24 de julho de 2026';
}

buildDots(); render();
</script>
</body>
</html>
